<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jt-temp</title>
    <!-- Téma no-flash script (design-system/dark-mode.html): a bundle előtt fut,
         hogy explicit témánál ne villanjon fel a rossz UI (FOUC). Rendszer-mód
         esetén NEM ír attribútumot — azt a CSS prefers-color-scheme ága viszi. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('jt-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) { /* letiltott storage — marad a rendszer-preferencia */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
